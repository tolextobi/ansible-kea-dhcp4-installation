---
# Kea DHCP - Subnetz-Konfiguration
# Lab-Netz 192.168.50-53.0/24

kea_subnets:

  # Subnet 1: Computerlabor A (mit PXE-Boot)
  - id: 1
    subnet: "192.168.50.0/24"
    router: "192.168.50.1"
    dns: "192.168.50.1"
    domain: "lab.intern"
    pool_start: "192.168.50.100"
    pool_end: "192.168.50.150"
    reservations:
      - hostname: "lab-a-pc01"
        hw_address: "aa:bb:cc:dd:01:01"
        ip_address: "192.168.50.10"
        pxe: true
      - hostname: "lab-a-pc02"
        hw_address: "aa:bb:cc:dd:01:02"
        ip_address: "192.168.50.11"
        pxe: true
      - hostname: "lab-a-pc03"
        hw_address: "aa:bb:cc:dd:01:03"
        ip_address: "192.168.50.12"
        pxe: true
      - hostname: "lab-a-pc04"
        hw_address: "aa:bb:cc:dd:01:04"
        ip_address: "192.168.50.13"
        pxe: true
      - hostname: "lab-a-pc05"
        hw_address: "aa:bb:cc:dd:01:05"
        ip_address: "192.168.50.14"
        pxe: true

  # Subnet 2: Computerlabor B (mit PXE-Boot)
  - id: 2
    subnet: "192.168.51.0/24"
    router: "192.168.51.1"
    dns: "192.168.50.1"
    domain: "lab.intern"
    pool_start: "192.168.51.100"
    pool_end: "192.168.51.150"
    reservations:
      - hostname: "lab-b-pc01"
        hw_address: "aa:bb:cc:dd:02:01"
        ip_address: "192.168.51.10"
        pxe: true
      - hostname: "lab-b-pc02"
        hw_address: "aa:bb:cc:dd:02:02"
        ip_address: "192.168.51.11"
        pxe: true
      - hostname: "lab-b-pc03"
        hw_address: "aa:bb:cc:dd:02:03"
        ip_address: "192.168.51.12"
        pxe: true
      - hostname: "lab-b-pc04"
        hw_address: "aa:bb:cc:dd:02:04"
        ip_address: "192.168.51.13"
        pxe: true
      - hostname: "lab-b-pc05"
        hw_address: "aa:bb:cc:dd:02:05"
        ip_address: "192.168.51.14"
        pxe: true

  # Subnet 3: Büro / Workstations (kein PXE)
  - id: 3
    subnet: "192.168.52.0/24"
    router: "192.168.52.1"
    dns: "192.168.50.1"
    domain: "lab.intern"
    pool_start: "192.168.52.100"
    pool_end: "192.168.52.150"
    reservations:
      - hostname: "workstation-01"
        hw_address: "aa:bb:cc:dd:03:01"
        ip_address: "192.168.52.10"
        pxe: false
      - hostname: "workstation-02"
        hw_address: "aa:bb:cc:dd:03:02"
        ip_address: "192.168.52.11"
        pxe: false
      - hostname: "workstation-03"
        hw_address: "aa:bb:cc:dd:03:03"
        ip_address: "192.168.52.12"
        pxe: false
      - hostname: "workstation-04"
        hw_address: "aa:bb:cc:dd:03:04"
        ip_address: "192.168.52.13"
        pxe: false
      - hostname: "workstation-05"
        hw_address: "aa:bb:cc:dd:03:05"
        ip_address: "192.168.52.14"
        pxe: false

  # Subnet 4: Gemischtes Netz - ZWEI Configs
  # Pool A: Lab-PCs mit PXE 
  # Pool B: Management-Devices ohne PXE 
  - id: 4
    subnet: "192.168.53.0/24"
    router: "192.168.53.1"
    dns: "192.168.50.1"
    domain: "lab.intern"
    pool_start: "192.168.53.100"
    pool_end: "192.168.53.199"
    reservations:
      # --- Pool A: Lab-PCs mit PXE-Boot ---
      - hostname: "mixed-pc01"
        hw_address: "aa:bb:cc:dd:04:01"
        ip_address: "192.168.53.10"
        pxe: true
      - hostname: "mixed-pc02"
        hw_address: "aa:bb:cc:dd:04:02"
        ip_address: "192.168.53.11"
        pxe: true
      - hostname: "mixed-pc03"
        hw_address: "aa:bb:cc:dd:04:03"
        ip_address: "192.168.53.12"
        pxe: true
      # --- Pool B: Management-Devices ohne PXE (wie gm-* in Produktion) ---
      - hostname: "gm-vidiwall-01"
        hw_address: "aa:bb:cc:dd:04:10"
        ip_address: "192.168.53.50"
        pxe: false
      - hostname: "gm-smartplug-01"
        hw_address: "aa:bb:cc:dd:04:11"
        ip_address: "192.168.53.51"
        pxe: false
      - hostname: "gm-display-01"
        hw_address: "aa:bb:cc:dd:04:12"
        ip_address: "192.168.53.52"
        pxe: false
      - hostname: "gm-printer-01"
        hw_address: "aa:bb:cc:dd:04:13"
        ip_address: "192.168.53.53"
        pxe: false

# PXE-Boot Server Einstellungen
kea_pxe_next_server: "192.168.50.1"
kea_pxe_boot_file: "/pxelinux.0"
